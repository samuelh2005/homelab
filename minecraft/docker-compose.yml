services:
  gate:
    image: ghcr.io/samuelh2005/miners-online-proxy:latest
    restart: unless-stopped
    volumes:
      - ./gate/config.yml:/config.yml
      - ./gate/branding.yml:/branding.yml
      - ./gate/:/var/gate/
    ports:
      - '25565:25565' # Java Edition
      - '25565:25565/udp' # Java Edition query
      - '19132:19132/udp' # Geyser listener
      - '8080:8080' # API
    secrets:
      - velocity_forwarding_secret
    networks:
      - minecraft

  lobby-1:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "1.21.11"
      USE_MEOWICE_FLAGS: "true"
      MAX_MEMORY: "2G"

      REPLACE_ENV_IN_PLACE: "true"
      REPLACE_ENV_VARIABLE_PREFIX: "CFG_"

      CFG_PROXY_SECRET_FILE: "/run/secrets/velocity_forwarding_secret"

      REMOVE_OLD_MODS: "true"
      MODRINTH_PROJECTS: |
        fabric-api:i5tSkVBH
        fabricproxy-lite:nR8AIdvx
        ferrite-core:Ii0gP3D8
        lithium:Ow7wA0kG
        styled-chat:nW0Cfq7D
        viafabric:xXnPtaqv
        viabackwards:1ImS09ar
        viarewind:lk3NTwIh
    depends_on:
      - gate
    volumes:
      - ./lobby-config:/config
    secrets:
      - velocity_forwarding_secret
    networks:
      - minecraft

networks:
  minecraft:

secrets:
  velocity_forwarding_secret:
    file: ./velocity_forwarding_secret.txt
